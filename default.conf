[ids]

*

[main]
# --- Modifier Layer Definitions ---
# Maintain standard modifier functions while enabling space-overload logic
shift = layer(s_layer)
control = layer(c_layer)
leftalt = layer(a_layer)
meta = layer(m_layer)

# Tap for Compose (AltGr + 102nd), hold for AltGr (Dual-role behavior)
rightalt = overloadt(g_layer, G-102nd, 150)

# --- Primary Space Key ---
# Tap for Space, hold for space_layer (Dual-role behavior)
space = overload(space_layer, space)

# --- 1. Custom Space Layer (Navigation & Language Switching) ---
[space_layer]
# Disable default space output to prevent accidental input
space = noop

# Directional Navigation (ESDF Cluster)
e = up
s = left
d = down
f = right

# Page Operations & Editing
w = pageup
r = pagedown
a = home
g = end
q = backspace

# Language Switching Signals (Fcitx5 / Mozc integration)
z = S-C-A-M-z
x = S-C-A-M-x
c = macro(S-C-A-M-v 50ms S-hiragana)
v = macro(S-C-A-M-v 50ms hiragana)

# Japanese Input Specific Keys
b = muhenkan
n = henkan

# Numpad Emulation
7 = kp7
8 = kp8
9 = kp9
0 = kpslash
u = kp4
i = kp5
o = kp6
p = kpasterisk
j = kp1
k = kp2
l = kp3
; = kpminus
m = kp0
, = kpcomma
. = kpdot
/ = kpplus

# --- 2. Modifier + Space Definitions ---
# Each layer inherits its respective modifier state (:S, :C, etc.)
# Tap: Sends Modifier + Space | Hold: Transitions to modifier-aware space layer

[s_layer:S]
space = overload(space_layer, S-space)
# Note: Assumes the modified UltimateKEYS layout where "Dead Greek" has been added.
# Tap for Dead Greek (Shift + AltGr + 102nd), hold for Shift + AltGr (Dual-role behavior)
rightalt = overloadt(g_layer, S-G-102nd, 150)

[c_layer:C]
space = overload(space_layer, C-space)

[a_layer:A]
space = overload(space_layer, A-space)

[m_layer:M]
space = overload(space_layer, M-space)

[g_layer:G]
space = overload(space_layer, G-space)