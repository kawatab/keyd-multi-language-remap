[ids]

*

# Kensington TB450
047d:80fa:61d36aac

[main]
# --- Modifier Layer Definitions ---
# Standard modifiers trigger their respective layers when held
shift = layer(s_layer)
control = layer(c_layer)
leftalt = layer(a_layer)
meta = layer(m_layer)
rightalt = layer(g_layer)

# --- Primary Space Key ---
# Tap behavior: Sends 'space'. Hold behavior (>200ms): Activates 'space_layer'
space = overloadt(space_layer, space, 200)

# Mouse wheel emulation: Tap 'C-v' within 200ms triggers middle mouse, else standard scroll
middlemouse = timeout(C-v, 200, middlemouse)

# --- Side Button Definitions (4th and 5th Buttons) ---
# NOTE: In this specific config, 'mouse1' refers to the 4th Button (Thumb Back)
#       and 'mouse2' refers to the 5th Button (Thumb Forward).
#       'leftmouse' and 'rightmouse' are the actual Left/Right click buttons.
# Logic: Hold these buttons to activate navigation layers
mouse1 = overload(m1_layer, mouse1)
mouse2 = overload(m2_layer, mouse2)

# --- 1. Custom Space Layer (Navigation, Numpad, & Language Switching) ---
[space_layer]
# Prevent accidental space insertion when holding the key
space = noop

# Directional Navigation (ESDF Cluster)
e = up
s = left
d = down
f = right

# Page Operations & Editing
w = pageup
r = pagedown
a = home
g = end
q = backspace

# Language Switching Signals (Fcitx5 / Mozc integration)
# Triggers specific modifier combinations for input method switching
102nd = S-C-A-M-f4
z = S-C-A-M-f3
x = S-C-A-M-f1
c = macro(S-C-A-M-f2 50ms S-hiragana)
v = macro(S-C-A-M-f2 50ms hiragana)

# Japanese Input Specific Keys (Mozc)
b = muhenkan
n = henkan

# Numpad Emulation (ISO/IEC 9995-2:2026 Numeric keypad emulation)
# Top Row
7 = kp7
8 = kp8
9 = kp9
0 = kpslash
# Middle Row
u = kp4
i = kp5
o = kp6
p = kpasterisk
# Bottom Row
j = kp1
k = kp2
l = kp3
; = kpminus
# Zero and Decimal
m = kp0
. = kpdot
/ = kpplus

# --- 2. Modifier + Space Definitions ---
# These layers activate when a modifier is held.
# Tap behavior: Sends Modifier + Space. Hold behavior: Activates 'space_layer' while retaining the modifier.

[s_layer:S]
space = overload(space_layer, S-space)
mouse1 = S-insert
mouse2 = S-delete

[c_layer:C]
space = overload(space_layer, C-space)
mouse1 = C-insert

[a_layer:A]
space = overload(space_layer, A-space)

[m_layer:M]
space = overload(space_layer, M-space)

[g_layer:G]
space = overload(space_layer, G-space)

# --- 3. Side Button Layers (Navigation Helpers) ---
# Activated by HOLDING the 4th (mouse1) or 5th (mouse2) buttons.
# While holding, the physical Left/Right clicks are remapped.

[m1_layer]
# Active while holding 4th Button (mapped as 'mouse1' in this config)
# Repurposes Left/Right clicks for document navigation
leftmouse = home
rightmouse = end

[m2_layer]
# Active while holding 5th Button (mapped as 'mouse2' in this config)
# Repurposes Left/Right clicks for page navigation
leftmouse = pageup
rightmouse = pagedown
